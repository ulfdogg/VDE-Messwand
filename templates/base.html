<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, initial-scale=1.0">
    <title>{% block title %}VDE Messwand{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* === Touch-Feedback Animation === */
        .touch-ripple {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99998;
            transform: translate(-50%, -50%) scale(0);
            animation: touch-ripple-anim 0.55s ease-out forwards;
        }
        @keyframes touch-ripple-anim {
            0%   { transform: translate(-50%, -50%) scale(0);   opacity: 1; }
            50%  { transform: translate(-50%, -50%) scale(1);   opacity: 0.6; }
            100% { transform: translate(-50%, -50%) scale(2);   opacity: 0; }
        }

        /* === Bildschirmtastatur === */
        #osk {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 15, 25, 0.98);
            border-top: 2px solid #e30613;
            padding: 12px 10px 18px;
            z-index: 99999;
            box-shadow: 0 -6px 24px rgba(0,0,0,0.6);
            user-select: none;
            -webkit-user-select: none;
        }
        .osk-row {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 6px;
        }
        .osk-key {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.18);
            border-bottom: 2px solid rgba(255,255,255,0.25);
            border-radius: 6px;
            color: #ffffff;
            font-size: 19px;
            font-family: inherit;
            padding: 13px 0;
            min-width: 44px;
            flex: 1;
            max-width: 70px;
            cursor: pointer;
            text-align: center;
            transition: background 0.08s, transform 0.05s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .osk-key:active {
            background: rgba(227, 6, 19, 0.45);
            transform: scale(0.93);
        }
        .osk-key.osk-wide  { max-width: 110px; flex: 2; font-size: 16px; }
        .osk-key.osk-wider { max-width: 170px; flex: 2.5; font-size: 16px; }
        .osk-key.osk-space { flex: 5; max-width: 380px; }
        .osk-key.osk-shift-active { background: rgba(227,6,19,0.35); }
        .osk-row-hint {
            text-align: center;
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 6px;
        }
    </style>
</head>
<body class="{% block body_class %}page-sub{% endblock %}">

<div class="aurora-bg"></div>
<div class="logo-ghosts">
    <div class="logo-ghost-wrap g1"><img src="/static/company_logo.png" alt=""></div>
    <div class="logo-ghost-wrap g2"><img src="/static/company_logo.png" alt=""></div>
    <div class="logo-ghost-wrap g3"><img src="/static/company_logo.png" alt=""></div>
</div>
<div class="particles" id="particles"></div>

    <!-- GPIO-Warnung (oben fixiert) -->
    <div id="gpio-warning" class="gpio-warning hidden">
        <div class="gpio-warning-content">
            <span class="gpio-warning-icon">⚠️</span>
            <span class="gpio-warning-text" id="gpio-warning-text">NOTAUS BETÄTIGT</span>
            <span class="gpio-warning-icon">⚠️</span>
        </div>
    </div>

    <div class="container">
        {% block navigation %}
        <div class="navigation-bar">
            <a href="javascript:history.back()" class="nav-btn back-btn" title="Zurück">
                <span class="nav-icon">←</span>
                <span class="nav-text">Zurück</span>
            </a>
            <a href="{{ url_for('index') }}" class="nav-btn home-btn" title="Startseite">
                <span class="nav-icon">🏠</span>
                <span class="nav-text">Home</span>
            </a>
        </div>
        {% endblock %}
        {% block content %}{% endblock %}
    </div>

    <!-- Custom Confirm Modal (ersetzt window.confirm() im Kiosk-Modus) -->
    <div id="confirm-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.75); z-index:999999; justify-content:center; align-items:center;">
        <div style="background: linear-gradient(135deg, rgba(15,15,25,0.98), rgba(25,25,40,0.98)); border: 1px solid rgba(227,6,19,0.5); border-radius: 18px; padding: 36px 32px; max-width: 440px; width: 90%; box-shadow: 0 12px 48px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.05);">
            <p id="confirm-message" style="color: rgba(255,255,255,0.9); margin: 0 0 28px 0; text-align:center; font-size: 1.15rem; line-height: 1.5; white-space: pre-line;"></p>
            <div style="display: flex; gap: 14px; justify-content: center;">
                <button id="confirm-yes" style="background: linear-gradient(45deg, #dc3545, #e74c3c); border: none; border-radius: 12px; color: white; padding: 14px 32px; font-size: 1.05rem; font-weight: 600; cursor: pointer; min-width: 130px; box-shadow: 0 4px 15px rgba(220,53,69,0.4); touch-action: manipulation;">Ja</button>
                <button id="confirm-no" style="background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.25); border-radius: 12px; color: rgba(255,255,255,0.8); padding: 14px 32px; font-size: 1.05rem; font-weight: 600; cursor: pointer; min-width: 130px; touch-action: manipulation;">Abbrechen</button>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
    <script>
        // Touch ripple effect (menu items)
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('touchstart', function(e) {
                const rect = this.getBoundingClientRect();
                const touch = e.touches[0];
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (touch.clientX - rect.left - size / 2) + 'px';
                ripple.style.top = (touch.clientY - rect.top - size / 2) + 'px';
                this.appendChild(ripple);
                ripple.addEventListener('animationend', () => ripple.remove());
            }, { passive: true });
        });

        // Globale Touch-Feedback Animation (Fingerabdruck-Kreis) – Maus + Touch
        document.addEventListener('pointerdown', function(e) {
            const el = document.createElement('div');
            el.className = 'touch-ripple';
            el.style.left = e.clientX + 'px';
            el.style.top  = e.clientY + 'px';
            el.style.width  = '80px';
            el.style.height = '80px';
            el.style.background = 'radial-gradient(circle, rgba(227,6,19,0.8) 0%, rgba(227,6,19,0.2) 50%, transparent 70%)';
            el.style.boxShadow = '0 0 0 3px rgba(227,6,19,0.9), 0 0 20px rgba(227,6,19,0.5)';
            document.body.appendChild(el);
            el.addEventListener('animationend', () => el.remove());
        });
    </script>
    <script>
        // GPIO-Status Überwachung
        function checkGPIOStatus() {
            fetch('/api/gpio/status')
                .then(response => response.json())
                .then(data => {
                    if (data.success && data.gpio_status) {
                        const warningDiv = document.getElementById('gpio-warning');
                        const warningText = document.getElementById('gpio-warning-text');

                        if (data.gpio_status.active) {
                            warningDiv.classList.remove('hidden');

                            // Zeige Countdown wenn Shutdown ansteht
                            if (data.gpio_status.shutdown_pending && data.gpio_status.shutdown_in_seconds !== null) {
                                const seconds = data.gpio_status.shutdown_in_seconds;
                                const minutes = Math.floor(seconds / 60);
                                const remainingSecs = seconds % 60;
                                warningText.textContent = `NOTAUS BETÄTIGT - SHUTDOWN IN ${minutes}:${remainingSecs.toString().padStart(2, '0')}`;
                            } else {
                                warningText.textContent = 'NOTAUS BETÄTIGT';
                            }
                        } else {
                            warningDiv.classList.add('hidden');
                        }
                    }
                })
                .catch(error => {
                    console.error('GPIO-Status Fehler:', error);
                });
        }

        // Starte Überwachung beim Laden
        document.addEventListener('DOMContentLoaded', function() {
            checkGPIOStatus();
            // Prüfe alle 500ms
            setInterval(checkGPIOStatus, 500);
        });
    </script>
    {% block scripts %}{% endblock %}
    <script>
    /* === Bildschirmtastatur (QWERTZ, Deutsch) === */
    (function () {
        'use strict';

        var LOWER = [
            ['1','2','3','4','5','6','7','8','9','0','ß','⌫'],
            ['q','w','e','r','t','z','u','i','o','p','ü'],
            ['a','s','d','f','g','h','j','k','l','ö','ä'],
            ['⇧','y','x','c','v','b','n','m',',','.','-','↵'],
            ['@','.de','{SP}','_','/','✕']
        ];
        var UPPER = [
            ['!','"','§','$','%','&','/','(',')','=','?','⌫'],
            ['Q','W','E','R','T','Z','U','I','O','P','Ü'],
            ['A','S','D','F','G','H','J','K','L','Ö','Ä'],
            ['⇧','Y','X','C','V','B','N','M',';',':','_','↵'],
            ['@','.com','{SP}','(',')','✕']
        ];

        var shifted = false;
        var activeEl = null;
        var hideTimer = null;

        function layout() { return shifted ? UPPER : LOWER; }

        function insert(text) {
            if (!activeEl) return;
            var s = activeEl.selectionStart, e = activeEl.selectionEnd;
            activeEl.value = activeEl.value.slice(0, s) + text + activeEl.value.slice(e);
            activeEl.selectionStart = activeEl.selectionEnd = s + text.length;
            activeEl.dispatchEvent(new Event('input', {bubbles: true}));
        }

        function handleKey(key) {
            if (!activeEl) return;
            if (key === '⌫') {
                var s = activeEl.selectionStart, e = activeEl.selectionEnd;
                if (s !== e) { insert(''); }
                else if (s > 0) {
                    activeEl.value = activeEl.value.slice(0, s - 1) + activeEl.value.slice(e);
                    activeEl.selectionStart = activeEl.selectionEnd = s - 1;
                    activeEl.dispatchEvent(new Event('input', {bubbles: true}));
                }
            } else if (key === '↵') {
                if (activeEl.tagName === 'TEXTAREA') { insert('\n'); }
                else { hideOSK(); activeEl.blur(); }
            } else if (key === '{SP}') {
                insert(' ');
            } else if (key === '⇧') {
                shifted = !shifted;
                renderOSK();
            } else if (key === '✕') {
                hideOSK(); activeEl.blur();
            } else {
                insert(key);
                if (shifted) { shifted = false; renderOSK(); }
            }
        }

        function buildOSK() {
            var osk = document.createElement('div');
            osk.id = 'osk';
            layout().forEach(function(row) {
                var rowDiv = document.createElement('div');
                rowDiv.className = 'osk-row';
                row.forEach(function(key) {
                    var btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'osk-key';
                    if (key === '{SP}')  { btn.classList.add('osk-space'); btn.textContent = ' '; }
                    else if (key === '⌫') { btn.classList.add('osk-wide'); btn.textContent = '⌫'; }
                    else if (key === '↵') { btn.classList.add('osk-wide'); btn.textContent = '↵'; }
                    else if (key === '⇧') { btn.classList.add('osk-wide'); btn.textContent = '⇧'; if (shifted) btn.classList.add('osk-shift-active'); }
                    else if (key === '✕') { btn.classList.add('osk-wide'); btn.textContent = '✕'; btn.style.color='#e30613'; }
                    else if (key === '.de' || key === '.com') { btn.classList.add('osk-wider'); btn.textContent = key; }
                    else { btn.textContent = key; }
                    btn.addEventListener('pointerdown', function(e) {
                        e.preventDefault();
                        clearTimeout(hideTimer);
                        handleKey(key);
                    });
                    rowDiv.appendChild(btn);
                });
                osk.appendChild(rowDiv);
            });
            return osk;
        }

        function renderOSK() {
            var old = document.getElementById('osk');
            var osk = buildOSK();
            osk.style.display = 'block';
            if (old) { old.replaceWith(osk); }
            else { document.body.appendChild(osk); }
        }

        function showOSK(el) {
            clearTimeout(hideTimer);
            activeEl = el;
            renderOSK();
            document.body.style.paddingBottom = '290px';
            setTimeout(function() { el.scrollIntoView({behavior:'smooth', block:'nearest'}); }, 120);
        }

        function hideOSK() {
            hideTimer = setTimeout(function() {
                var osk = document.getElementById('osk');
                if (osk) osk.style.display = 'none';
                document.body.style.paddingBottom = '';
                activeEl = null;
            }, 180);
        }

        var TEXT_TYPES = ['text','password','email','search','number','tel','url',''];

        document.addEventListener('DOMContentLoaded', function() {
            document.addEventListener('focusin', function(e) {
                var el = e.target;
                if (el.tagName === 'TEXTAREA' ||
                    (el.tagName === 'INPUT' && TEXT_TYPES.indexOf((el.type||'').toLowerCase()) !== -1 && !el.readOnly)) {
                    showOSK(el);
                }
            });
            document.addEventListener('focusout', function() {
                hideOSK();
            });
        });
    })();
    </script>
</body>
</html>
